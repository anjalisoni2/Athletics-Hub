<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AthleticsHub | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(147, 51, 234, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #9333ea;
            font-size: 32px;
            font-weight: 800;
        }

        .logo span {
            color: #23a6d5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #9333ea;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: #9333ea;
        }

        .remember-me label {
            color: #666;
            font-size: 14px;
        }

        .forgot-password {
            color: #23a6d5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.4);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .signup-link p {
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #9333ea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #fecaca;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.4);
        }

        .modal-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .role-badge {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            color: white;
            border-radius: 25px;
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn-continue {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3);
        }

        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(147, 51, 234, 0.4);
        }
    </style>
</head>

<body>

    <div id="roleModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h2 id="modalTitle">Welcome!</h2>
            <p id="modalMessage">You are entering as</p>
            <div class="role-badge" id="roleBadge">Admin</div>
            <button class="btn-continue" onclick="proceedToHome()">Continue</button>
        </div>
    </div>

    <div class="login-container">
        <div class="logo">
            <h1>Athletics<span>Hub</span></h1>
        </div>

        <div id="errorMsg" class="error-message">Invalid username or password</div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div id="checkStatusLink" style="text-align: center; margin-top: 16px; display: none;">
            <button type="button" onclick="showCheckStatusModal()" style="background: transparent; border: 1px solid #e2e8f0; color: #64748b; font-size: 13px; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease;" onmouseover="this.style.background='#f1f5f9'; this.style.borderColor='#2563eb'; this.style.color='#2563eb';" onmouseout="this.style.background='transparent'; this.style.borderColor='#e2e8f0'; this.style.color='#64748b';">
                🔍 Check Signup Status
            </button>
        </div>

        <div class="signup-link">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <!-- Check Status Modal -->
    <div id="checkStatusModal" class="modal-overlay hidden" style="display: none;">
        <div class="modal-content" style="max-width: 400px; padding: 24px; position: relative;">
            <span class="modal-close" onclick="closeCheckStatusModal()" style="position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #64748b;">&times;</span>
            <h3 style="margin: 0 0 16px 0; font-size: 20px; color: #1e293b;">Check Signup Status</h3>
            <p style="margin: 0 0 16px 0; font-size: 14px; color: #64748b;">Enter your username to check your organizer signup status</p>
            <input type="text" id="statusUsername" placeholder="Enter username" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box;">
            <button onclick="checkOrganizerStatus()" style="width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; box-sizing: border-box;">Check Status</button>
            <div id="statusResult" style="margin-top: 16px; padding: 12px; border-radius: 8px; display: none; box-sizing: border-box;"></div>
        </div>
    </div>

    <script type="module">
        import { getAPIEndpoint } from './scripts/api-config.js';

        function getUrlParameter(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        let requiredRole = null;

        function initializeLoginPage() {
            requiredRole = getUrlParameter('role');
            
            // Show check status link ONLY for organizer login
            const checkStatusLink = document.getElementById('checkStatusLink');
            if (checkStatusLink) {
                if (requiredRole === 'organizer') {
                    checkStatusLink.style.display = 'block';
                } else {
                    checkStatusLink.style.display = 'none';
                }
            }
        }

        window.handleLogin = async function (event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.style.display = "none";

            if (username === "admin" && password === "admin123") {
                if (requiredRole && requiredRole !== "superadmin") {
                    errorMsg.textContent = "You don't have access to this section.";
                    errorMsg.style.display = "block";
                    return;
                }
                const users = JSON.parse(localStorage.getItem("users")) || {};
                users[username] = {
                    password: password,
                    firstName: "Super",
                    lastName: "Admin",
                    email: "admin@athletics.local",
                    mobile: "",
                    role: "superadmin"
                };
                localStorage.setItem("users", JSON.stringify(users));
                localStorage.setItem("currentUser", username);
                localStorage.setItem("authToken", "local-dev-token");
                window.showRolePopup("superadmin");
                return;
            }

            try {
                const loginRes = await fetch(getAPIEndpoint("/login-api/"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                if (loginRes.ok) {
                    const userData = await loginRes.json();
                    if (requiredRole && userData.role !== requiredRole) {
                        errorMsg.textContent = "You don't have access to this section.";
                        errorMsg.style.display = "block";
                        return;
                    }
                    const users = JSON.parse(localStorage.getItem("users")) || {};
                    users[username] = {
                        password: password,
                        firstName: userData.firstName,
                        lastName: userData.lastName,
                        email: userData.email,
                        mobile: userData.mobile,
                        role: userData.role,
                        approvalStatus: userData.approvalStatus || "approved"
                    };
                    localStorage.setItem("users", JSON.stringify(users));
                    localStorage.setItem("currentUser", username);
                    localStorage.setItem("authToken", "local-dev-token");
                    window.showRolePopup(userData.role);
                } else {
                    const errorData = await loginRes.json();
                    errorMsg.textContent = errorData.message || "Invalid username or password";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.textContent = "Unable to connect to server. Please try again later.";
                errorMsg.style.display = "block";
            }
        };

        window.showRolePopup = function (role) {
            const modal = document.getElementById("roleModal");
            const roleBadge = document.getElementById("roleBadge");
            const roleMap = {
                "superadmin": "Super Admin",
                "organizer": "Organizer",
                "participant": "Athlete"
            };
            roleBadge.textContent = roleMap[role] || role;
            modal.classList.add("active");
        };

        window.proceedToHome = function () {
            window.location.href = "index.html";
        };

        window.showCheckStatusModal = function() {
            console.log('Opening modal...');
            const modal = document.getElementById("checkStatusModal");
            console.log('Modal element:', modal);
            if (modal) {
                modal.classList.remove("hidden");
                modal.style.display = "flex";
                console.log('Modal should be visible now');
            }
            const resultDiv = document.getElementById("statusResult");
            if (resultDiv) {
                resultDiv.style.display = "none";
            }
            const usernameInput = document.getElementById("statusUsername");
            if (usernameInput) {
                usernameInput.value = "";
            }
        };

        window.closeCheckStatusModal = function() {
            const modal = document.getElementById("checkStatusModal");
            if (modal) {
                modal.classList.add("hidden");
                modal.style.display = "none";
            }
        };

        window.checkOrganizerStatus = async function() {
            const username = document.getElementById("statusUsername").value.trim();
            const resultDiv = document.getElementById("statusResult");
            
            if (!username) {
                resultDiv.style.display = "block";
                resultDiv.style.background = "#fef2f2";
                resultDiv.style.color = "#dc2626";
                resultDiv.textContent = "Please enter a username";
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.style.background = "#f1f5f9";
            resultDiv.style.color = "#64748b";
            resultDiv.textContent = "Checking...";

            try {
                const apiUrl = getAPIEndpoint(`/api/organizers/status/${username}/`);
                console.log('Checking status at:', apiUrl);
                
                const res = await fetch(apiUrl);
                console.log('Response status:', res.status);
                
                const data = await res.json();
                console.log('Response data:', data);
                
                if (data.status === "approved") {
                    resultDiv.style.background = "#dcfce7";
                    resultDiv.style.color = "#166534";
                    resultDiv.innerHTML = `<strong>✓ Approved!</strong><br>Your organizer account has been approved. You can now <a href="login.html" style="color:#2563eb;">login here</a>.`;
                } else if (data.status === "pending") {
                    resultDiv.style.background = "#fef3c7";
                    resultDiv.style.color = "#92400e";
                    resultDiv.innerHTML = `<strong>⏳ Pending Review</strong><br>Your organizer account is still waiting for admin approval. Please check back later.`;
                } else if (data.status === "rejected") {
                    resultDiv.style.background = "#fef2f2";
                    resultDiv.style.color = "#dc2626";
                    resultDiv.innerHTML = `<strong>✕ Rejected</strong><br>Your organizer account request was rejected. Please contact support for more information.`;
                } else if (data.status === null || data.status === undefined) {
                    resultDiv.style.background = "#f1f5f9";
                    resultDiv.style.color = "#64748b";
                    resultDiv.innerHTML = `<strong>? Not Found</strong><br>No organizer account found with this username. Please check your username or sign up <a href="signup.html" style="color:#2563eb;">here</a>.`;
                } else {
                    resultDiv.style.background = "#f1f5f9";
                    resultDiv.style.color = "#64748b";
                    resultDiv.textContent = "Status: " + data.status;
                }
            } catch (err) {
                console.error('Error:', err);
                resultDiv.style.display = "block";
                resultDiv.style.background = "#fef2f2";
                resultDiv.style.color = "#dc2626";
                resultDiv.textContent = "Unable to connect to server. Please try again later. Error: " + err.message;
            }
        };

        document.addEventListener("DOMContentLoaded", initializeLoginPage);
    </script>

</body>

</html>
