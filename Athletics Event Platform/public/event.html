            document.querySelector('input[name="End_location"]').value = event.End_location || event.location?.split(' to ')[1] || '';

// --- AUTO-DISTANCE CALCULATION LOGIC ---

// Geocode location using Nominatim API
async function geocodeLocation(locationName) {
    if (!locationName || locationName.trim() === '') return null;

    try {
        const encodedLocation = encodeURIComponent(locationName);
        const url = `https://nominatim.openstreetmap.org/search?q=${encodedLocation}&format=json&limit=1`;

        console.log("Geocoding:", locationName);
        const response = await fetch(url, {
            headers: { 'User-Agent': 'AthleticsHub-App' }
        });

        if (!response.ok) throw new Error("Nominatim API error");

        const data = await response.json();

        if (data && data.length > 0) {
            const result = data[0];
            const coords = {
                lat: parseFloat(result.lat),
                lng: parseFloat(result.lon)
            };
            console.log("✓ Geocoded:", locationName, coords);
            return coords;
        } else {
            console.error("No results found for:", locationName);
            return null;
        }
    } catch (err) {
        console.error('Geocoding error:', err);
        return null;
    }
}

// Fetch distance using OSRM API directly
async function fetchDistanceOSRM(start, end) {
    try {
        if (!start || !end) {
            console.error("Invalid coordinates for OSRM");
            return null;
        }

        // Ensure coordinates are numbers
        const startLng = parseFloat(start.lng);
        const startLat = parseFloat(start.lat);
        const endLng = parseFloat(end.lng);
        const endLat = parseFloat(end.lat);

        const url = `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson`;

        console.log("OSRM Request - Start:", startLat, startLng, "End:", endLat, endLng);
        console.log("OSRM URL:", url);

        const response = await fetch(url);

        if (!response.ok) {
            console.error("OSRM API returned status:", response.status);
            throw new Error("OSRM API error");
        }

        const data = await response.json();
        console.log("OSRM Response:", data);

        if (data.routes && data.routes.length > 0) {
            const route = data.routes[0];
            const distanceMeters = route.distance;
            const distanceKm = (distanceMeters / 1000).toFixed(2);
            const duration = Math.round(route.duration / 60);

            console.log("✓ OSRM Success - Distance:", distanceKm, "km, Duration:", duration, "min");
            return distanceKm;
        } else {
            console.error("OSRM: No routes found in response");
            return null;
        }
    } catch (err) {
        console.error('OSRM fetch error:', err.message);
        return null;
    }
}

// Fallback: Calculate straight-line distance using Haversine formula
function calculateStraightLineDistance(start, end) {
    if (!start || !end) return null;

    const R = 6371; // Earth radius in km
    const dLat = (end.lat - start.lat) * Math.PI / 180;
    const dLon = (end.lng - start.lng) * Math.PI / 180;
    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(start.lat * Math.PI / 180) * Math.cos(end.lat * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    const distance = R * c;

    // Return without 20% estimation - just straight line
    return distance.toFixed(2);
}

window.updateDistance = async function() {
    const startLocInput = document.querySelector('input[name="Start_location"]');
    const endLocInput = document.querySelector('input[name="End_location"]');
    const distanceInput = document.querySelector('input[name="distance"]');

    let startLoc = startLocInput.value.trim();
    let endLoc = endLocInput.value.trim();

    if (!startLoc || !endLoc) {
        distanceInput.value = "";
        distanceInput.placeholder = "Enter both locations to calculate";
        return;
    }

    distanceInput.placeholder = "🔄 Calculating distance...";
    distanceInput.disabled = true;

    try {
        console.log("===== DISTANCE CALCULATION START =====");
        console.log("Start Location:", startLoc);
        console.log("End Location:", endLoc);

        // STEP 1: Geocode start location
        console.log("\n📍 Step 1: Geocoding start location...");
        const startCoord = await geocodeLocation(startLoc);
        if (!startCoord) {
            console.error("❌ Start location geocoding failed");
            distanceInput.placeholder = "⚠️ Start location not found";
            distanceInput.disabled = false;
            return;
        }
        console.log("✓ Start coords:", startCoord);

        // STEP 2: Geocode end location
        console.log("\n📍 Step 2: Geocoding end location...");
        const endCoord = await geocodeLocation(endLoc);
        if (!endCoord) {
            console.error("❌ End location geocoding failed");
            distanceInput.placeholder = "⚠️ End location not found";
            distanceInput.disabled = false;
            return;
        }
        console.log("✓ End coords:", endCoord);

        // STEP 3: Fetch distance from OSRM
        console.log("\n🛣️ Step 3: Fetching OSRM route distance...");
        let distance = await fetchDistanceOSRM(startCoord, endCoord);

        // STEP 4: Fallback to straight-line if OSRM fails
        if (!distance) {
            console.log("\n⚠️ Step 4: OSRM failed, using straight-line calculation...");
            distance = calculateStraightLineDistance(startCoord, endCoord);
            console.log("Straight-line distance:", distance, "km");
            if (distance) {
                distanceInput.value = distance + " km";
                console.log("✓ Using straight-line distance:", distance, "km");
            } else {
                console.error("❌ Could not calculate distance");
                distanceInput.placeholder = "Could not calculate distance";
            }
        } else {
            distanceInput.value = distance + " km";
            console.log("\n✅ FINAL DISTANCE:", distance, "km");
        }

        console.log("===== DISTANCE CALCULATION END =====\n");

    } catch (err) {
        console.error("Error during distance calculation:", err);
        distanceInput.placeholder = "Error calculating distance";
    } finally {
        distanceInput.disabled = false;
    }
}

// Attach listeners to location fields
document.addEventListener('DOMContentLoaded', () => {
    const startInput = document.querySelector('input[name="Start_location"]');
    const endInput = document.querySelector('input[name="End_location"]');

    if (startInput && endInput) {
        // Debounce function to avoid too many API calls
        let timeout = null;
        const debouncedUpdate = () => {
            clearTimeout(timeout);
            timeout = setTimeout(updateDistance, 1000);
        };

        startInput.addEventListener('input', debouncedUpdate);
        endInput.addEventListener('input', debouncedUpdate);
    }
});

window.formatCardNumber = function(input) {
    let value = input.value.replace(/\s/g, '');
    let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
    input.value = formatted;
}

window.formatExpiry = function(input) {
    let value = input.value.replace(/\D/g, '');
    if (value.length >= 2) {
        value = value.slice(0, 2) + '/' + value.slice(2, 4);
    }
    input.value = value;
}

window.detectCardType = function() {
    const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
    const typeEl = document.getElementById('card-type');

    let cardType = 'Unknown';
    if (/^4/.test(cardNumber)) {
        cardType = 'Visa';
    } else if (/^5[1-5]/.test(cardNumber)) {
        cardType = 'Mastercard';
    } else if (/^3[47]/.test(cardNumber)) {
        cardType = 'American Express';
    } else if (/^6(?:011|5)/.test(cardNumber)) {
        cardType = 'Discover';
    }

    typeEl.textContent = cardNumber.length >= 4 ? `(${cardType})` : '';
}

function luhnCheck(cardNumber) {
    let sum = 0;
    let isEven = false;

    for (let i = cardNumber.length - 1; i >= 0; i--) {
        let digit = parseInt(cardNumber.charAt(i), 10);

        if (isEven) {
            digit *= 2;
            if (digit > 9) {
                digit -= 9;
            }
        }

        sum += digit;
        isEven = !isEven;
    }

    return sum % 10 === 0;
}

function showCardError(message) {
    const errorEl = document.getElementById('card-error');
    if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }
}

function clearCardError() {
    const errorEl = document.getElementById('card-error');
    if (errorEl) {
        errorEl.style.display = 'none';
    }
}

window.processCardPayment = function(e, eventName, organizer) {
    e.preventDefault();
    clearCardError();

    const cardName = document.getElementById('card-name').value.trim();
    const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
    const cardExpiry = document.getElementById('card-expiry').value.trim();
    const cardCVV = document.getElementById('card-cvv').value.trim();

    // Cardholder Name Validation
    if (!cardName) {
        showCardError('Cardholder name is required');
        return;
    }

    if (cardName.length < 3) {
        showCardError('Cardholder name must be at least 3 characters');
        return;
    }

    if (!/^[a-zA-Z\s]+$/.test(cardName)) {
        showCardError('Cardholder name can only contain letters and spaces');
        return;
    }

    // Card Number Validation
    if (!cardNumber) {
        showCardError('Card number is required');
        return;
    }

    if (!/^\d+$/.test(cardNumber)) {
        showCardError('Card number must contain only digits');
        return;
    }

    if (cardNumber.length < 13 || cardNumber.length > 19) {
        showCardError('Card number must be between 13 and 19 digits');
        return;
    }

    // Validate card using Luhn algorithm
    if (!luhnCheck(cardNumber)) {
        showCardError('Invalid card number. Please check and try again');
        return;
    }

    // Expiry Date Validation
    if (!cardExpiry) {
        showCardError('Expiry date is required');
        return;
    }

    if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) {
        showCardError('Expiry must be in MM/YY format (e.g., 12/25)');
        return;
    }

    const [month, year] = cardExpiry.split('/');
    const monthInt = parseInt(month, 10);

    if (monthInt < 1 || monthInt > 12) {
        showCardError('Month must be between 01 and 12');
        return;
    }

    const currentDate = new Date();
    const currentYear = currentDate.getFullYear() % 100;
    const currentMonth = currentDate.getMonth() + 1;
    const expiryYear = parseInt(year, 10);

    if (expiryYear < currentYear) {
        showCardError('Card has expired');
        return;
    }

    if (expiryYear === currentYear && monthInt < currentMonth) {
        showCardError('Card has expired');
        return;
    }

    // CVV Validation
    if (!cardCVV) {
        showCardError('CVV is required');
        return;
    }

    if (!/^\d{3,4}$/.test(cardCVV)) {
        showCardError('CVV must be 3 or 4 digits');
        return;
    }

    // All validations passed
    closeCardPaymentForm();
    processPaymentSuccess('card', `Card ending in ${cardNumber.slice(-4)}`, eventName, organizer);
}

function processRealPayment(eventData) {
    // Check if Razorpay is loaded
    if (typeof Razorpay === 'undefined') {
        alert('Payment gateway is loading. Please try again in a moment.');
        console.error('Razorpay script not loaded');
        return;
    }

    const options = {
        key: RAZORPAY_CONFIG.key_id,
        amount: RAZORPAY_CONFIG.payment_amount,
        currency: RAZORPAY_CONFIG.currency,
        name: 'Athletics Event Platform',
        description: 'Event Creation Fee - ₹150',
        prefill: {
            name: eventData.organizer || 'Organizer',
            email: eventData.organizerEmail || 'organizer@athleticsplatform.com',
            contact: '9999999999'
        },
        notes: {
            event_name: eventData.name,
            event_category: eventData.category
        },
        theme: {
            color: '#2563eb'
        },
        timeout: 60,
        handler: function(response) {
            console.log('Payment successful:', response);
            createEventAfterPayment(eventData, response.razorpay_payment_id);
        },
        modal: {
            ondismiss: function() {
                console.log('Payment window closed by user');
                alert('Payment cancelled. Please try again.');
            }
        }
    };

    try {
        const rzp = new Razorpay(options);
        rzp.open();
    } catch (error) {
        console.error('Error opening Razorpay checkout:', error);
        alert('Failed to open payment gateway. Error: ' + error.message);
    }
}

async function createEventAfterPayment(eventData, paymentId) {
    try {
        // Prepare FormData for backend
        const formData = new FormData();
        formData.append('name', eventData.name);
        formData.append('category', eventData.category);
        formData.append('start_date', eventData.start_date);
        formData.append('end_date', eventData.end_date);
        formData.append('start_time', eventData.start_time);
        formData.append('end_time', eventData.end_time);
        formData.append('Start_location', eventData.Start_location);
        formData.append('End_location', eventData.End_location);
        formData.append('distance', eventData.distance);
        formData.append('max_participants', eventData.max_participants);
        formData.append('fee', eventData.fee);
        formData.append('description', eventData.description);
        formData.append('organizer', eventData.organizer);
        formData.append('created_by_username', eventData.createdByUsername);
        formData.append('payment_id', paymentId);

        if (eventData.image) {
            formData.append('image', eventData.image);
        }

        // Try to send to backend API first (image will be stored on server)
        let imageUrl = '';
        let backendEventId = null;

        try {
            const response = await fetch(getAPIEndpoint('/api/create-event/'), {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            console.log('Backend response:', data);

            if (data.status === 'success' && data.event_id) {
                backendEventId = data.event_id;
                // Use the actual image URL returned from backend
                if (data.imageUrl) {
                    imageUrl = data.imageUrl;
                    console.log('✅ Image saved on server:', imageUrl);
                }
            }
        } catch (err) {
            console.warn('Backend API error:', err.message);
            // Continue with localStorage fallback
        }

        // Create event object for localStorage with proper image URL
        const newEvent = {
            id: backendEventId || Date.now(),
            name: eventData.name,
            title: eventData.name,
            category: eventData.category,
            date: eventData.start_date,
            start_date: eventData.start_date,
            end_date: eventData.end_date,
            start_time: eventData.start_time,
            end_time: eventData.end_time,
            distance: eventData.distance,
            max_participants: eventData.max_participants,
            fee: eventData.fee,
            description: eventData.description,
            organizer: eventData.organizer,
            createdByUsername: eventData.createdByUsername,
            createdBy: eventData.createdByUsername,
            status: 'pending',
            payment_id: paymentId,
            imageUrl: imageUrl,  // Store SERVER URL instead of local file
            image: imageUrl || '',
            registrations: 0,
            participants: 0
        };

        // Save to localStorage
        const events = JSON.parse(localStorage.getItem("events") || "[]");
        events.push(newEvent);
        localStorage.setItem("events", JSON.stringify(events));
        console.log('Event saved to localStorage with image URL:', newEvent);

        // Show success message with approval workflow info
        const successMsg = `
✅ Payment Successful!

Your event has been created successfully and is now pending approval.

📋 What happens next:
• Your event has been submitted to the Super Admin panel for review
• The Super Admin will review your event details and approve/reject it
• You will be notified once your event is approved
• Until approval, your event will not be visible to athletes

Event Name: ${eventData.name}
Payment ID: ${paymentId}
Status: Pending Approval

Thank you for using Athletics Event Platform!
        `;

        alert(successMsg);
        window.location.href = 'thank_you.html';

    } catch (error) {
        console.error('Error creating event after payment:', error);
        alert('Event creation failed. Please contact support.');
    }
}

async function updateEvent(eventId, form, userData, currentUser) {
    try {
        const organizerName = userData?.organizationName || userData?.name || currentUser;
        
        const updatedEvent = {
            id: parseInt(eventId),
            name: form.name.value,
            title: form.name.value,
            category: form.category.value,
            start_date: form.start_date.value,
            end_date: form.end_date.value,
            start_time: form.start_time.value,
            end_time: form.end_time.value,
            Start_location: form.Start_location.value,
            End_location: form.End_location.value,
            distance: form.distance.value,
            max_participants: parseInt(form.max_participants.value) || 0,
            fee: parseFloat(form.fee.value) || 0,
            description: form.description.value,
            organizer: organizerName,
            createdByUsername: currentUser,
            createdBy: currentUser,
            updatedAt: new Date().toISOString()
        };

        // Handle image if new one uploaded
        if (form.image.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                updatedEvent.imageUrl = e.target.result;
                updatedEvent.image = e.target.result;
                saveUpdatedEvent(eventId, updatedEvent);
            };
            reader.readAsDataURL(form.image.files[0]);
        } else {
            // Keep existing image
            const events = JSON.parse(localStorage.getItem("events") || "[]");
            const existingEvent = events.find(e => String(e.id) === String(eventId));
            if (existingEvent) {
                updatedEvent.imageUrl = existingEvent.imageUrl || existingEvent.image || '';
                updatedEvent.image = existingEvent.image || '';
            }
            saveUpdatedEvent(eventId, updatedEvent);
        }
    } catch (error) {
        console.error('Error updating event:', error);
        alert('Failed to update event. Please try again.');
    }
}

function saveUpdatedEvent(eventId, updatedEvent) {
    const events = JSON.parse(localStorage.getItem("events") || "[]");
    const index = events.findIndex(e => String(e.id) === String(eventId));
    
    if (index !== -1) {
        events[index] = { ...events[index], ...updatedEvent };
        localStorage.setItem("events", JSON.stringify(events));
        
        alert('✅ Event updated successfully!');
        window.location.href = 'index.html';
    } else {
        alert('Event not found.');
    }
}
